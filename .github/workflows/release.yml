name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.0)'
        required: true

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so we can push back to main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build (unsigned, arm64)
        run: |
          xcodebuild \
            -project git-widget.xcodeproj \
            -scheme app \
            -configuration Release \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ARCHS=arm64 \
            SYMROOT="$RUNNER_TEMP/build" \
            build

      - name: Package
        run: |
          cd "$RUNNER_TEMP/build/Release"
          tar -czf "$RUNNER_TEMP/GitWidget.tar.gz" GitWidget.app
          echo "Archive: $(du -sh "$RUNNER_TEMP/GitWidget.tar.gz" | cut -f1)"

      - name: Compute Nix SRI hash
        id: hash
        run: |
          SRI=$(python3 - "$RUNNER_TEMP/GitWidget.tar.gz" <<'EOF'
          import sys, hashlib, base64
          with open(sys.argv[1], 'rb') as f:
              h = hashlib.sha256(f.read())
          print('sha256-' + base64.b64encode(h.digest()).decode())
          EOF
          )
          echo "sri=$SRI" >> "$GITHUB_OUTPUT"
          echo "Nix SRI hash: $SRI"

      - name: Update flake.nix
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          SHA256="${{ steps.hash.outputs.sri }}"
          sed -i '' \
            -e "s/version = \"[^\"]*\";.*# @release/version = \"${VERSION}\"; # @release/" \
            -e "s|sha256  = \"[^\"]*\";.*# @release|sha256  = \"${SHA256}\"; # @release|" \
            flake.nix

      - name: Commit updated flake.nix
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git diff --cached --quiet || \
            git commit -m "chore: release v${{ steps.ver.outputs.version }} [skip ci]"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: ${{ runner.temp }}/GitWidget.tar.gz
